name: Deploy to GitHub Pages

# Builds the Vite SPA and publishes it to GitHub Pages.
# Requires: repo Settings > Pages > "Build and deployment" > Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed by the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Serve from the repository subpath on github.io.
          BASE_PATH: /Moderncoffee/

      - name: SPA fallback
        # GitHub Pages has no redirect rules, so serve index.html for unknown
        # paths by copying it to 404.html.
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
